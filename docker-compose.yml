networks:
  pm_bot_network:
    driver: bridge

volumes:
  pg_data: {}
  redis_data: {}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ========================
  # Plane.so
  # ========================
  plane-proxy:
    image: makeplane/plane-proxy:stable
    restart: on-failure
    depends_on:
      plane-api:
        condition: service_healthy
      plane-frontend:
        condition: service_started
    environment:
      - SITE_ADDRESS=:80
      - FILE_SIZE_LIMIT=5MB
      - BUCKET_NAME=plane
    ports:
      - "8003:80"
    networks:
      - pm_bot_network
    logging: *default-logging

  plane-frontend:
    image: makeplane/plane-frontend:stable
    restart: on-failure
    depends_on:
      plane-api:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8003/api
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      pm_bot_network:
        aliases:
          - web
          - admin
    logging: *default-logging

  plane-migrations:
    image: makeplane/plane-backend:stable
    restart: "no"
    command: ./bin/docker-entrypoint-migrator.sh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_URL=${PLANE_DATABASE_URL}
      - REDIS_URL=${PLANE_REDIS_URL}
      - CELERY_BROKER_URL=${PLANE_CELERY_BROKER_URL}
      - SECRET_KEY=${PLANE_SECRET_KEY}
      - STORAGE_TYPE=${STORAGE_TYPE}
      - USE_S3=${USE_S3}
    networks:
      - pm_bot_network
    logging: *default-logging

  plane-api:
    image: makeplane/plane-backend:stable
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-1}
      - REDIS_URL=${PLANE_REDIS_URL}
      - SECRET_KEY=${PLANE_SECRET_KEY}
      - DATABASE_URL=${PLANE_DATABASE_URL}
      - WEB_URL=${PLANE_WEB_URL}
      - APP_BASE_URL=${PLANE_WEB_URL}
      - ADMIN_BASE_URL=${PLANE_WEB_URL}/god-mode
      - SPACE_BASE_URL=${PLANE_WEB_URL}/spaces
      - API_BASE_URL=${PLANE_WEB_URL}/api
      - ENABLE_EMAIL_PASSWORD=${PLANE_ENABLE_EMAIL_PASSWORD_LOGIN}
      - ENABLE_SIGNUP=${PLANE_ENABLE_SIGNUP}
      - ENABLE_MAGIC_LINK=${PLANE_ENABLE_MAGIC_LINK_LOGIN}
      - ADMIN_PASSWORD=${PLANE_ADMIN_PASSWORD}
      - CORS_ALLOWED_ORIGIN=${PLANE_WEB_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - STORAGE_TYPE=${STORAGE_TYPE}
      - USE_S3=${USE_S3}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
    volumes:
      - ./uploads:/code/plane/media
    networks:
      pm_bot_network:
        aliases:
          - api
    healthcheck:
      test: [ "CMD", "python", "-c", "import http.client; conn = http.client.HTTPConnection('localhost', 8000); conn.request('GET', '/'); resp = conn.getresponse(); exit(0 if resp.status == 200 else 1)" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 300s
    logging: *default-logging

  plane-worker:
    image: makeplane/plane-backend:stable
    restart: on-failure
    command: ./bin/docker-entrypoint-worker.sh
    depends_on:
      plane-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_URL=${PLANE_DATABASE_URL}
      - REDIS_URL=${PLANE_REDIS_URL}
      - CELERY_BROKER_URL=${PLANE_CELERY_BROKER_URL}
      - SECRET_KEY=${PLANE_SECRET_KEY}
      - WEB_URL=${PLANE_WEB_URL}
      - APP_BASE_URL=${PLANE_WEB_URL}
      - ADMIN_BASE_URL=${PLANE_WEB_URL}/god-mode
      - SPACE_BASE_URL=${PLANE_WEB_URL}/spaces
      - API_BASE_URL=${PLANE_WEB_URL}/api
      - STORAGE_TYPE=${STORAGE_TYPE}
      - USE_S3=${USE_S3}
    volumes:
      - ./uploads:/code/plane/media
    networks:
      - pm_bot_network
    logging: *default-logging

  # ========================
  # Infrastructure
  # ========================
  redis:
    image: redis/redis-stack
    restart: on-failure
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:8005:8001"
    networks:
      - pm_bot_network
    logging: *default-logging

  postgres:
    image: pgvector/pgvector:pg16
    restart: on-failure
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-pm_bot_db}
      - POSTGRES_USER=${POSTGRES_USER:-pm_bot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme_this_in_production}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pm_bot}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pm_bot_network
    logging: *default-logging

  # ========================
  # Django Backend
  # ========================
  django-web:
    build: ./backend
    restart: on-failure
    volumes:
      - ./backend:/app
    command: [ "python", "manage.py", "runserver", "0.0.0.0:8000", "--noreload" ]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/admin" ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    ports:
      - "8002:8000"
    networks:
      - pm_bot_network
    logging: *default-logging
