networks:
  pm_bot_network:
    driver: bridge

volumes:
  pg_django_data: {}
  redis_data: {}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis:
    image: redis/redis-stack
    restart: on-failure
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:8005:8001"
    networks:
      - pm_bot_network
    logging: *default-logging
  postgres-django:
    image: pgvector/pgvector:pg16
    hostname: postgres-django
    restart: on-failure
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DJANGO_POSTGRES_DB:-pm_bot_db}
      - POSTGRES_USER=${DJANGO_POSTGRES_USER:-pm_bot}
      - POSTGRES_PASSWORD=${DJANGO_POSTGRES_PASSWORD:-changeme_django}
    volumes:
      - pg_django_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DJANGO_POSTGRES_USER:-pm_bot} -d ${DJANGO_POSTGRES_DB:-pm_bot_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pm_bot_network
    logging: *default-logging

  django-web:
    build: ./backend
    restart: on-failure
    volumes:
      - ./backend:/app
    command: >
      sh -c "python manage.py migrate --noinput && 
             python manage.py collectstatic --noinput && 
             daphne -b 0.0.0.0 -p 8000 backend.asgi:application"
    depends_on:
      postgres-django:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres-django
      - POSTGRES_DB=${DJANGO_POSTGRES_DB:-pm_bot_db}
      - POSTGRES_USER=${DJANGO_POSTGRES_USER:-pm_bot}
      - POSTGRES_PASSWORD=${DJANGO_POSTGRES_PASSWORD:-changeme_django}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/admin" ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    ports:
      - "8002:8000"
    networks:
      - pm_bot_network
    logging: *default-logging

  celery-worker:
    build: ./backend
    restart: on-failure
    volumes:
      - ./backend:/app
    command: [ "uv", "run", "celery", "-A", "backend", "worker", "--loglevel=info" ]
    depends_on:
      redis:
        condition: service_healthy
      postgres-django:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres-django
      - POSTGRES_DB=${DJANGO_POSTGRES_DB:-pm_bot_db}
      - POSTGRES_USER=${DJANGO_POSTGRES_USER:-pm_bot}
      - POSTGRES_PASSWORD=${DJANGO_POSTGRES_PASSWORD:-changeme_django}
    networks:
      - pm_bot_network
    logging: *default-logging

  celery-beat:
    build: ./backend
    restart: on-failure
    volumes:
      - ./backend:/app
    command: [ "uv", "run", "celery", "-A", "backend", "beat", "--loglevel=info" ]
    depends_on:
      redis:
        condition: service_healthy
      postgres-django:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres-django
      - POSTGRES_DB=${DJANGO_POSTGRES_DB:-pm_bot_db}
      - POSTGRES_USER=${DJANGO_POSTGRES_USER:-pm_bot}
      - POSTGRES_PASSWORD=${DJANGO_POSTGRES_PASSWORD:-changeme_django}
    networks:
      - pm_bot_network
    logging: *default-logging
